<!DOCTYPE html>
<html>
<head>
    <title>Spell Bee Bot</title>
    <script src="https://unpkg.com/@daily-co/daily-js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: inline-block; width: 420px; }
        h1 { color: #2c3e50; }
        .score-board { background: #ecf0f1; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 20px; font-weight: bold; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; }

        #join-btn  { background: #27ae60; color: white; }
        #start-btn { background: #2980b9; color: white; }
        #next-btn  { background: #95a5a6; color: white; }

        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; }
        #status { margin-top: 20px; font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="box">
    <h1>🐝 Spell Bee</h1>

    <div class="score-board">
        Score: <span id="score">0</span> | Round: <span id="round">0</span>/5
    </div>

    <div class="btn-group">
        <button id="join-btn">1. Join Room</button>
        <button id="start-btn" disabled>2. Start Game</button>
        <button id="next-btn"  disabled>Skip Word</button>
    </div>

    <div id="status">Status: Offline</div>
</div>

<script>
    const ROOM_URL = "https://saurav6.daily.co/spellbee";
    let callFrame = null;

    const joinBtn  = document.getElementById('join-btn');
    const startBtn = document.getElementById('start-btn');
    const nextBtn  = document.getElementById('next-btn');
    const status   = document.getElementById('status');
    const scoreEl  = document.getElementById('score');
    const roundEl  = document.getElementById('round');

    joinBtn.onclick = async () => {
        joinBtn.disabled = true;
        status.innerText = "Connecting...";

        callFrame = window.DailyIframe.createFrame({ videoSource: false });

        try {
            await callFrame.join({ url: ROOM_URL });
            status.innerText = "Connected!";
            startBtn.disabled = false;
        } catch (e) {
            status.innerText = "Connection Failed";
            joinBtn.disabled = false;
            return;
        }

        callFrame.on('app-message', (evt) => {
            if (evt.data.type === 'score_update') {
                scoreEl.innerText = evt.data.score;
                roundEl.innerText = evt.data.wordCount;

                if (evt.data.wordCount >= 5) {
                    status.innerText = "Game Over!";
                    nextBtn.disabled = true;
                }
            }
        });
    };

    startBtn.onclick = () => {
        callFrame.sendAppMessage({ action: "start_game" }, "*");
        status.innerText = "Listen, then spell aloud. Bot grades after you pause.";
        startBtn.disabled = true;
        nextBtn.disabled = false;
    };

    nextBtn.onclick = () => {
        callFrame.sendAppMessage({ action: "skip_word" }, "*");
        status.innerText = "Skipped. Next word coming...";
    };
</script>
</body>
</html>
